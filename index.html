<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Complete Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #e2e8f0; 
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            overflow: hidden;
            margin: 0;
        }

        /* --- BACKGROUND ANIMATIONS --- */
        .bg-blob {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 8s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        /* --- CLAYMORPHISM STYLES --- */
        
        /* Main Floating Card */
        .clay-card {
            background: #f1f5f9;
            border-radius: 40px;
            box-shadow: 
                20px 20px 40px #c2cbd6,
                -20px -20px 40px #ffffff,
                inset 2px 2px 5px rgba(255, 255, 255, 0.8),
                inset -3px -3px 7px rgba(0, 0, 0, 0.05);
        }

        /* Top Icon Bubble */
        .clay-bubble {
            background: #f8fafc;
            box-shadow: 
                8px 8px 16px #c2cbd6, 
                -8px -8px 16px #ffffff,
                inset 2px 2px 4px rgba(255, 255, 255, 0.9);
        }

        /* Pressed-in Receipt Area */
        .clay-inset {
            background: #e2e8f0;
            border-radius: 24px;
            box-shadow: 
                inset 8px 8px 16px #c2cbd6,
                inset -8px -8px 16px #ffffff;
        }

        /* Fluffy Payment Button */
        .clay-btn {
            background: #3b82f6; /* Premium Blue */
            color: white;
            border-radius: 28px;
            box-shadow: 
                10px 10px 20px rgba(59, 130, 246, 0.4),
                -10px -10px 20px rgba(255, 255, 255, 0.8),
                inset 4px 4px 10px rgba(255, 255, 255, 0.5),
                inset -4px -4px 10px rgba(29, 78, 216, 0.5);
            transition: all 0.2s ease-in-out;
        }

        .clay-btn:active {
            transform: scale(0.96);
            box-shadow: 
                5px 5px 10px rgba(59, 130, 246, 0.4),
                -5px -5px 10px rgba(255, 255, 255, 0.8),
                inset 6px 6px 12px rgba(29, 78, 216, 0.6),
                inset -6px -6px 12px rgba(255, 255, 255, 0.3);
        }

        /* Agency Badge */
        .clay-badge {
            background: #f8fafc;
            border-radius: 24px; /* Slightly rounder */
            padding: 12px 20px;
            box-shadow: 
                8px 8px 16px #c2cbd6,
                -8px -8px 16px #ffffff,
                inset 1px 1px 2px rgba(255, 255, 255, 0.8);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #334155;
            position: relative;
            overflow: hidden;
            border: 2px solid transparent;
        }
        
        /* Subtle glowing border effect on hover */
        .clay-badge::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 24px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,255,255,0) 50%, rgba(59,130,246,0.2));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .clay-badge:hover {
            box-shadow: 
                12px 12px 20px #c2cbd6,
                -12px -12px 20px #ffffff,
                inset 1px 1px 2px rgba(255, 255, 255, 0.9);
            transform: translateY(-3px);
            border-color: rgba(255,255,255,0.5);
        }
        
        .clay-badge:active {
            transform: scale(0.96) translateY(0);
            box-shadow: 
                4px 4px 8px #c2cbd6,
                -4px -4px 8px #ffffff,
                inset 2px 2px 4px rgba(0,0,0,0.02);
        }

        /* The icon container inside the badge */
        .badge-icon-wrap {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                inset 3px 3px 6px #d1d5db, 
                inset -3px -3px 6px #ffffff;
            transition: all 0.3s ease;
        }
        
        .clay-badge:hover .badge-icon-wrap {
            box-shadow: 
                inset 4px 4px 8px #c2cbd6, 
                inset -4px -4px 8px #ffffff;
        }

        .clay-badge:hover .badge-icon {
            transform: scale(1.1) rotate(5deg);
            color: #2563eb; /* Darker blue on hover */
        }

        /* Loading shimmer effect */
        .shimmer {
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }
        @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
    </style>
</head>
<body>

    <!-- Aesthetic Background Blobs -->
    <div class="bg-blob w-72 h-72 bg-blue-300 rounded-full top-[-5%] left-[-10%]"></div>
    <div class="bg-blob w-72 h-72 bg-emerald-200 rounded-full bottom-[-5%] right-[-10%]" style="animation-delay: -4s;"></div>

    <!-- MAIN CLAY CARD -->
    <div class="clay-card w-full max-w-[380px] p-8 flex flex-col relative z-10 animate-[fadeIn_0.5s_ease-out]">
        
        <!-- Header / Logo -->
        <div class="text-center mb-6">
            <div class="clay-bubble w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-5">
                <i class="ph-fill ph-leaf text-4xl text-emerald-500"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight leading-none mb-2" id="uiPayeeName">Loading...</h1>
            <p class="text-sm font-medium text-slate-500" id="uiNote">Fetching details</p>
        </div>

        <!-- Inset Receipt Area -->
        <div class="clay-inset p-6 mb-8 text-center relative overflow-hidden flex flex-col items-center justify-center min-h-[120px]">
            <p class="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1">Amount to Pay</p>
            <div class="flex items-start justify-center gap-1">
                <span class="text-2xl font-bold text-slate-400 mt-1">₹</span>
                <span class="text-5xl font-black text-slate-800 tracking-tighter" id="uiAmount">--</span>
            </div>
            <div class="absolute top-0 left-0 w-full h-full shimmer pointer-events-none rounded-2xl"></div>
        </div>

        <!-- Warning for Desktop Users -->
        <div id="desktopWarning" class="hidden mb-6 bg-amber-50 border border-amber-200 rounded-2xl p-4 text-center">
            <i class="ph-fill ph-warning-circle text-amber-500 text-2xl mb-1"></i>
            <p class="text-xs font-bold text-amber-800">Please open this link on your mobile phone to pay via UPI apps.</p>
        </div>

        <!-- 1-Click Payment Button -->
        <button onclick="executeBlinkitPayment()" id="payBtn" class="clay-btn w-full py-5 text-lg font-extrabold flex justify-center items-center gap-3 group relative overflow-hidden">
            <i class="ph-fill ph-wallet text-2xl group-hover:scale-110 transition-transform"></i> 
            <span id="btnText">Pay via UPI App</span>
        </button>

        <!-- Trust / Security Indicator -->
        <div class="flex justify-center items-center gap-3 mt-6 opacity-60">
            <i class="ph-fill ph-shield-check text-emerald-600 text-lg"></i>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">100% Secure & Direct</p>
        </div>
    </div>

    <!-- BEAUTIFIED SEEN AND SOLD AGENCY BADGE -->
    <a href="https://tusharnanwani80-rgb.github.io/seen-and-sold-check/" target="_blank" rel="noopener noreferrer" class="clay-badge mt-10 z-10 group">
        <div class="badge-icon-wrap">
            <i class="ph-fill ph-rocket-launch text-blue-400 text-xl badge-icon transition-all duration-300"></i>
        </div>
        <div class="flex flex-col pr-2">
            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none mb-1">Crafted With Precision</span>
            <span class="text-[14px] font-extrabold leading-none text-slate-800 tracking-tight group-hover:text-blue-600 transition-colors">Seen and Sold Agency</span>
        </div>
    </a>

    <script>
        // ==========================================
        // DYNAMIC URL PARAMETER EXTRACTOR
        // ==========================================
        function getPaymentDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            return {
                pa: urlParams.get('pa') || 't7517445450@axl',      // Default UPI ID from your prompt
                pn: urlParams.get('pn') || 'Vedacure Clinic',      // Payee Name
                am: urlParams.get('am') || '500.00',               // Amount
                tn: urlParams.get('tn') || 'Consultation Deposit'  // Transaction Note
            };
        }

        const paymentData = getPaymentDetails();

        // Populate the UI with dynamic data
        document.getElementById('uiPayeeName').innerText = paymentData.pn;
        document.getElementById('uiNote').innerText = paymentData.tn;
        
        // Format amount cleanly (remove .00 if it exists for cleaner UI display)
        const displayAmt = paymentData.am.endsWith('.00') ? paymentData.am.replace('.00', '') : paymentData.am;
        document.getElementById('uiAmount').innerText = displayAmt;

        // ==========================================
        // UPI INTENT LOGIC
        // ==========================================
        function executeBlinkitPayment() {
            const btnText = document.getElementById('btnText');
            
            // Visual feedback on click
            btnText.innerText = "Opening App...";
            
            // Construct the exact UPI Deep Link Protocol string
            const upiIntentURL = `upi://pay?pa=${paymentData.pa}&pn=${encodeURIComponent(paymentData.pn)}&am=${paymentData.am}&cu=INR&tn=${encodeURIComponent(paymentData.tn)}`;

            // Trigger the OS intent
            setTimeout(() => {
                window.location.href = upiIntentURL;
                
                // Reset button text gently after a few seconds
                setTimeout(() => {
                    btnText.innerText = "Pay via UPI App";
                }, 2500);
            }, 150);
        }

        // ==========================================
        // DESKTOP DETECTION & WARNING
        // ==========================================
        // UPI apps don't exist on desktop browsers. Warn the user if they open this on a PC.
        window.addEventListener('DOMContentLoaded', () => {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            if (!isMobile) {
                // Show warning banner
                document.getElementById('desktopWarning').classList.remove('hidden');
                
                // Deactivate the primary button style
                const btn = document.getElementById('payBtn');
                btn.style.background = '#94a3b8'; // Slate gray
                btn.style.boxShadow = 'inset 2px 2px 4px rgba(0,0,0,0.1)';
                document.getElementById('btnText').innerText = "Open on Mobile to Pay";
                
                // Alert instead of intent on desktop
                btn.onclick = (e) => {
                    e.preventDefault();
                    alert("⚠️ UPI payments require a mobile device with apps like GPay, PhonePe, or Paytm installed. Please open this link on your smartphone.");
                };
            }
        });
    </script>
</body>
</html>
